[pytest]
# Pytest configuration for OpenClaw Sentiment Analysis

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Markers
markers =
    unit: Unit tests (fast, isolated, no external dependencies)
    integration: Integration tests (require external services like Kafka)
    performance: Performance benchmarks (may be slow)
    llm: LLM validation tests (require API keys)
    boundary: Boundary/edge case tests

# Output options
addopts =
    -v
    --tb=short
    --strict-markers
    --disable-warnings

# Test paths
testpaths = tests

# Minimum Python version
minversion = 3.8

# Logging
log_cli = true
log_cli_level = INFO
